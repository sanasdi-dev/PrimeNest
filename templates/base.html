{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="PrimeNest Luxury Real Estate Platform">
    <meta name="keywords" content="Real Estate, Property, Villa, Apartment, Luxury Home">
    <meta name="author" content="PrimeNest">

    <title>
        {% block title %}
        PrimeNest | Luxury Real Estate
        {% endblock %}
    </title>

    <link rel="icon" href="{% static 'images/favicon.png' %}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/hero.css' %}">
    <link rel="stylesheet" href="{% static 'css/search.css' %}">
    <link rel="stylesheet" href="{% static 'css/cards.css' %}">
    <link rel="stylesheet" href="{% static 'css/featured.css' %}">
    <link rel="stylesheet" href="{% static 'css/statistics.css' %}">
    <link rel="stylesheet" href="{% static 'css/why_choose.css' %}">
    <link rel="stylesheet" href="{% static 'css/testimonials.css' %}">
    <link rel="stylesheet" href="{% static 'css/cta.css' %}">
    <link rel="stylesheet" href="{% static 'css/detail.css' %}">
    <link rel="stylesheet" href="{% static 'css/about.css' %}">
    <link rel="stylesheet" href="{% static 'css/contact.css' %}">
    <link rel="stylesheet" href="{% static 'css/latest_properties.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body class="{% block body_class %}{% endblock %}">

{% include 'header.html' %}

<main>

    {% block content %}
    {% endblock %}

</main>

{% include 'footer.html' %}

<button id="backToTop">
    <i class="fa-solid fa-arrow-up"></i>
</button>

<div class="floating-contact">

    <a href="#">
        <i class="fa-solid fa-phone"></i>
    </a>

    <a href="#">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <a href="#">
        <i class="fa-solid fa-envelope"></i>
    </a>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

<script src="{% static 'js/animations.js' %}"></script>

<script>

AOS.init({

    duration:900,

    once:true,

    easing:"ease-in-out",

});

</script>

{% block extra_js %}
{% endblock %}

</body>

</html>
